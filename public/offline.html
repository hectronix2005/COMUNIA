<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sin conexión — COMUNIA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           background: #F5F6FA; color: #1B2A4A; padding: 1.5rem; }
    .card { max-width: 420px; text-align: center; background: #fff; padding: 2rem 1.5rem;
            border-radius: 12px; box-shadow: 0 4px 18px rgba(0,0,0,.06); }
    h1 { font-size: 1.4rem; margin: .25rem 0 .5rem; }
    p { color: #6c757d; line-height: 1.5; margin: .25rem 0 1.25rem; }
    .icon { font-size: 3rem; }
    button { background: #1B2A4A; color: #fff; border: 0; padding: .65rem 1.25rem;
             border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0F1A2E; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>Parece que estás sin internet. Cuando vuelvas a conectarte, COMUNIA seguirá donde lo dejaste.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
